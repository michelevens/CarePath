<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CarePath</title>
    <script>
      // GitHub Pages SPA fallback — rewrites a deep-link 404 into a hashed
      // path that index.html unpacks back into a real URL. See:
      // https://github.com/rafgraph/spa-github-pages
      (function () {
        var segments = 1; // number of path segments to preserve (project page = 1)
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + segments)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(segments)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
