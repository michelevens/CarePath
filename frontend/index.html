<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarePath — Long-term care, modernized</title>
    <meta
      name="description"
      content="Find skilled nursing, assisted living, and memory care with real availability, real reviews, and real prices."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Defensive URL normalizer — runs BEFORE the SPA fallback and BEFORE
      // React Router. Catches URLs like /CarePathsearch?... where someone
      // shared / typed / autocompleted a path missing the slash separator
      // between the project base and the route. Rewrites to /CarePath/...
      // so React Router (basename="/CarePath/") can match.
      (function () {
        var BASE = "/CarePath";
        var p = location.pathname;
        if (
          p.length > BASE.length &&
          p.indexOf(BASE) === 0 &&
          p.charAt(BASE.length) !== "/"
        ) {
          history.replaceState(
            null,
            "",
            BASE + "/" + p.slice(BASE.length) + location.search + location.hash
          );
        }
      })();

      // GitHub Pages SPA fallback unpacker — pairs with public/404.html.
      (function () {
        if (location.search.startsWith("?/")) {
          var decoded = location.search
            .slice(2)
            .split("&")
            .map(function (p) {
              return p.replace(/~and~/g, "&");
            });
          history.replaceState(
            null,
            "",
            location.pathname.slice(0, -1) +
              decoded[0] +
              (decoded.slice(1).join("&") ? "?" + decoded.slice(1).join("&") : "") +
              location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
